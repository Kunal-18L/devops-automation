---
# tasks file for roles/docker
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Docker
  apt:
    name: docker.io
    state: present
  notify: Restart Docker

- name: Enable and Start Docker service
  service:
    name: docker
    state: started
    enabled: yes

- name: Add Ubuntu user to docker group
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: yes
